<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Recommender</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="title">👗 Weather Clothing Recommender</h1>
    <div id="container" class="container">
        <p class="subtitle">Enter the temperature and get a comfy outfit suggestion.</p>
        <label class="label" for="temperature">🌡️ Temperature</label>
        <input type="text" id="temperature" placeholder="e.g. 18">

        <label class="label" for="humidity">💧 Humidity</label>
        <input type="text" id="humidity" placeholder="optional">

        <button id="recommendBtn">✨ Recommend Outfit</button>
        <div id="recommendation" class="recommendation"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
